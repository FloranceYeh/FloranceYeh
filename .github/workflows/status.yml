name: Update README cards

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # 生成总统计卡片
      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&locale=en&hide_border=true&bg_color=0d1117&title_color=a0d8ff&text_color=e0e7ff&icon_color=8a7fff
          path: imgs/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # 生成语言统计卡片
      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&langs_count=6&locale=en&hide_border=true&bg_color=0d1117&title_color=a0d8ff&text_color=e0e7ff
          path: imgs/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # 提交生成的卡片到仓库
      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add imgs/*.svg
          git commit -m "Update README cards" || exit 0
          git push